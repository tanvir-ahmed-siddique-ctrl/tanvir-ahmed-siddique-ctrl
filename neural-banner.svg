<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <style>
      .nd { fill: #58a6ff; }
      .ln { stroke: #1f6feb; stroke-width: 0.8; fill: none; opacity: 0; }

      .n0 { animation: pulse 3.1s 0.0s infinite ease-in-out; }
      .n1 { animation: pulse 2.7s 0.4s infinite ease-in-out; }
      .n2 { animation: pulse 3.4s 0.8s infinite ease-in-out; }
      .n3 { animation: pulse 2.9s 1.2s infinite ease-in-out; }
      .n4 { animation: pulse 3.2s 0.2s infinite ease-in-out; }
      .n5 { animation: pulse 2.6s 0.6s infinite ease-in-out; }
      .n6 { animation: pulse 3.5s 1.0s infinite ease-in-out; }
      .n7 { animation: pulse 2.8s 0.3s infinite ease-in-out; }
      .n8 { animation: pulse 3.0s 0.7s infinite ease-in-out; }
      .n9 { animation: pulse 2.5s 1.1s infinite ease-in-out; }
      .n10{ animation: pulse 3.3s 0.5s infinite ease-in-out; }
      .n11{ animation: pulse 2.7s 0.9s infinite ease-in-out; }
      .n12{ animation: pulse 3.1s 0.1s infinite ease-in-out; }
      .n13{ animation: pulse 2.9s 0.4s infinite ease-in-out; }
      .n14{ animation: pulse 3.4s 0.8s infinite ease-in-out; }
      .n15{ animation: pulse 2.6s 1.3s infinite ease-in-out; }
      .n16{ animation: pulse 3.0s 0.2s infinite ease-in-out; }
      .n17{ animation: pulse 2.8s 0.6s infinite ease-in-out; }
      .n18{ animation: pulse 3.2s 1.0s infinite ease-in-out; }
      .n19{ animation: pulse 2.5s 0.0s infinite ease-in-out; }

      .l0 { animation: flash 2.8s 0.2s infinite ease-in-out; }
      .l1 { animation: flash 3.2s 0.7s infinite ease-in-out; }
      .l2 { animation: flash 2.5s 1.1s infinite ease-in-out; }
      .l3 { animation: flash 3.5s 0.4s infinite ease-in-out; }
      .l4 { animation: flash 2.9s 0.9s infinite ease-in-out; }
      .l5 { animation: flash 3.1s 0.3s infinite ease-in-out; }
      .l6 { animation: flash 2.7s 1.4s infinite ease-in-out; }
      .l7 { animation: flash 3.3s 0.6s infinite ease-in-out; }
      .l8 { animation: flash 2.6s 1.0s infinite ease-in-out; }
      .l9 { animation: flash 3.0s 0.1s infinite ease-in-out; }
      .l10{ animation: flash 2.8s 0.8s infinite ease-in-out; }
      .l11{ animation: flash 3.4s 0.5s infinite ease-in-out; }
      .l12{ animation: flash 2.5s 1.2s infinite ease-in-out; }
      .l13{ animation: flash 3.1s 0.3s infinite ease-in-out; }
      .l14{ animation: flash 2.9s 0.7s infinite ease-in-out; }

      @keyframes pulse {
        0%,100% { opacity:0.25; r:2; }
        50%      { opacity:1.0;  r:4; }
      }
      @keyframes flash {
        0%,100% { opacity:0; }
        40%,60% { opacity:0.55; }
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="160" fill="#0d1117" rx="12"/>

  <!-- edges -->
  <line class="ln l0"  x1="60"  y1="40"  x2="140" y2="80"/>
  <line class="ln l1"  x1="60"  y1="40"  x2="200" y2="30"/>
  <line class="ln l2"  x1="140" y1="80"  x2="240" y2="60"/>
  <line class="ln l3"  x1="200" y1="30"  x2="280" y2="90"/>
  <line class="ln l4"  x1="240" y1="60"  x2="320" y2="40"/>
  <line class="ln l5"  x1="280" y1="90"  x2="360" y2="70"/>
  <line class="ln l6"  x1="320" y1="40"  x2="400" y2="80"/>
  <line class="ln l7"  x1="360" y1="70"  x2="440" y2="50"/>
  <line class="ln l8"  x1="400" y1="80"  x2="480" y2="100"/>
  <line class="ln l9"  x1="440" y1="50"  x2="520" y2="70"/>
  <line class="ln l10" x1="480" y1="100" x2="560" y2="60"/>
  <line class="ln l11" x1="520" y1="70"  x2="620" y2="90"/>
  <line class="ln l12" x1="560" y1="60"  x2="680" y2="40"/>
  <line class="ln l13" x1="620" y1="90"  x2="720" y2="60"/>
  <line class="ln l14" x1="680" y1="40"  x2="760" y2="80"/>

  <line class="ln l2"  x1="100" y1="120" x2="200" y2="30"/>
  <line class="ln l5"  x1="180" y1="140" x2="320" y2="40"/>
  <line class="ln l8"  x1="300" y1="130" x2="440" y2="50"/>
  <line class="ln l11" x1="450" y1="130" x2="560" y2="60"/>
  <line class="ln l14" x1="580" y1="130" x2="720" y2="60"/>
  <line class="ln l1"  x1="140" y1="80"  x2="280" y2="90"/>
  <line class="ln l4"  x1="240" y1="60"  x2="400" y2="80"/>
  <line class="ln l7"  x1="360" y1="70"  x2="480" y2="100"/>
  <line class="ln l10" x1="480" y1="100" x2="620" y2="90"/>
  <line class="ln l13" x1="620" y1="90"  x2="760" y2="80"/>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle class="nd n0"  cx="60"  cy="40"  r="3"/>
    <circle class="nd n1"  cx="140" cy="80"  r="2.5"/>
    <circle class="nd n2"  cx="200" cy="30"  r="3"/>
    <circle class="nd n3"  cx="240" cy="60"  r="2.5"/>
    <circle class="nd n4"  cx="280" cy="90"  r="3"/>
    <circle class="nd n5"  cx="320" cy="40"  r="2.5"/>
    <circle class="nd n6"  cx="360" cy="70"  r="3"/>
    <circle class="nd n7"  cx="400" cy="80"  r="2.5"/>
    <circle class="nd n8"  cx="440" cy="50"  r="3"/>
    <circle class="nd n9"  cx="480" cy="100" r="2.5"/>
    <circle class="nd n10" cx="520" cy="70"  r="3"/>
    <circle class="nd n11" cx="560" cy="60"  r="2.5"/>
    <circle class="nd n12" cx="620" cy="90"  r="3"/>
    <circle class="nd n13" cx="680" cy="40"  r="2.5"/>
    <circle class="nd n14" cx="720" cy="60"  r="3"/>
    <circle class="nd n15" cx="760" cy="80"  r="2.5"/>
    <circle class="nd n16" cx="100" cy="120" r="2.5"/>
    <circle class="nd n17" cx="180" cy="140" r="3"/>
    <circle class="nd n18" cx="300" cy="130" r="2.5"/>
    <circle class="nd n19" cx="450" cy="130" r="3"/>
    <circle class="nd n0"  cx="580" cy="130" r="2.5"/>
  </g>
</svg>
